<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backstory - The Hidden Levers</title>
    <style>
        :root {
            --bg-color: #f7f6f2;
            --text-color: #2c3531;
            --accent-color: #5a786b; /* Soothing Sage Green */
            --card-bg: #ffffff;
            --card-hover: rgba(90, 120, 107, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Georgia, serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .top-bar {
            max-width: 900px;
            margin: 0 auto 30px auto;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .site-title {
            font-size: 2.2rem;
            margin: 0;
            font-weight: bold;
            color: var(--text-color);
        }

        .author-name {
            font-size: 0.85rem;
            color: #777;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-top: 12px;
        }

        .site-description {
            font-size: 1.05rem;
            color: #555;
            margin: 0;
            max-width: 700px;
            line-height: 1.5;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            margin-bottom: 20px;
            display: inline-block;
        }

        .back-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* View 1: Dashboard Layout */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        .chapter-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .chapter-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 14px 18px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            color: var(--text-color);
            transition: all 0.2s;
            font-weight: 600;
            border-left: 4px solid transparent;
        }

        .chapter-btn:hover, .chapter-btn.active {
            background-color: var(--card-hover);
            color: var(--accent-color);
            border-left-color: var(--accent-color);
        }

        .preview-pane {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            text-align: center;
        }

        .preview-image {
            width: 100%;
            max-height: 380px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 15px;
        }

        .explore-trigger-btn {
            margin-top: 25px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .explore-trigger-btn:hover {
            opacity: 0.9;
        }

        /* View 2: Immersive Reader Workspace */
        .reader-layout {
            display: none; 
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.02);
        }

        .reader-header {
            font-size: 2.2rem;
            margin: 5px 0 20px 0;
            text-align: center;
        }

        /* 🎙️ TTS Audio Panel Styling (Matches original clean aesthetic) */
        .narration-deck {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fdfdfd;
            border: 1px solid #e0dddb;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 25px;
            max-width: fit-content;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .audio-trigger-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: var(--accent-color);
        }

        .speed-panel-label {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #777;
            margin-left: 8px;
        }

        .audio-speed-btn {
            background: #f4f3ef;
            border: 1px solid #d1cfcb;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 2px 8px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-color);
        }

        .audio-speed-btn:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .speed-tracker-display {
            font-family: monospace;
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--text-color);
            min-width: 35px;
            text-align: center;
        }

        .split-reader-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
            height: 450px;
        }

        .map-viewer-frame {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            background: #fbfbfa;
        }

        .map-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .text-content-frame {
            height: 100%;
            overflow-y: auto;
            padding-right: 15px;
        }

        .text-content-frame::-webkit-scrollbar {
            width: 6px;
        }
        .text-content-frame::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.02);
            border-radius: 10px;
        }
        .text-content-frame::-webkit-scrollbar-thumb {
            background: rgba(90, 120, 107, 0.3);
            border-radius: 10px;
        }

        .reader-body {
            font-size: 1.15rem;
            color: #3e4743;
            margin: 0;
            white-space: pre-wrap;
        }

        .section-divider {
            text-align: center;
            border-bottom: 1px solid #e0dddb;
            line-height: 0.1em;
            margin: 40px 0;
        }

        .section-divider span {
            background: var(--card-bg);
            padding: 0 15px;
            color: var(--accent-color);
            font-weight: bold;
            letter-spacing: 1.5px;
            font-size: 0.85rem;
        }

        /* Clean List Layout for Categories */
        .category-block {
            margin-bottom: 30px;
        }

        .category-header {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--accent-color);
            border-bottom: 1px solid #e8e6e3;
            padding-bottom: 6px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ledger-rows-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .ledger-row-item {
            background: none;
            border: none;
            padding: 4px 0;
            width: 100%;
            text-align: left;
            cursor: pointer;
            display: grid;
            grid-template-columns: 28px 1fr;
            align-items: start;
            gap: 4px;
        }

        .ship-bullet {
            font-size: 1.1rem;
            line-height: 1.2;
            color: var(--accent-color);
            transition: transform 0.2s ease;
        }

        .ledger-content-wrap {
            display: flex;
            flex-direction: column;
        }

        .ledger-title-line {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
        }

        .ledger-link-text {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-color);
            text-decoration: underline dashed rgba(90, 120, 107, 0.4);
            text-underline-offset: 3px;
        }

        .ledger-file-stamp {
            font-family: monospace;
            font-size: 0.8rem;
            color: #888;
            font-weight: bold;
        }

        .ledger-hook-text {
            font-size: 0.95rem;
            font-style: italic;
            margin: 4px 0 0 0;
            line-height: 1.4;
            background: linear-gradient(to right, #2c3531 0%, #2c3531 50%, var(--accent-color) 100%);
            background-size: 200% 100%;
            background-position: 100% 0;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #666;
            transition: background-position 0.4s ease;
        }

        .ledger-row-item:hover .ship-bullet {
            transform: translate(2px, -1px);
        }

        .ledger-row-item:hover .ledger-link-text {
            color: var(--accent-color);
            text-decoration-style: solid;
        }

        .ledger-row-item:hover .ledger-hook-text {
            background-position: 0 0;
        }

        /* Clean Popups styling */
        dialog {
            border: none;
            border-radius: 12px;
            padding: 0;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            background: #ffffff;
            overflow: hidden;
        }

        dialog::backdrop {
            background: rgba(44, 53, 49, 0.4);
            backdrop-filter: blur(4px);
        }

        .popup-img {
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            display: block;
        }

        .popup-content-box {
            padding: 30px;
            position: relative;
        }

        .close-x {
            position: absolute;
            top: -210px; 
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .popup-title {
            font-size: 1.3rem;
            margin: 0 0 12px 0;
            color: var(--text-color);
        }

        /* FIXED: Preserves your spreadsheet paragraphs perfectly */
        .popup-body-content {
            margin: 0;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #333;
            white-space: pre-wrap; 
            text-align: justify;
        }

        .loading-msg {
            text-align: center;
            font-size: 1.2rem;
            padding: 50px 0;
            color: #666;
        }

        @media (max-width: 750px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .split-reader-grid { grid-template-columns: 1fr; height: auto; }
            .map-viewer-frame { height: 300px; }
            .text-content-frame { height: auto; padding-right: 0; }
            .header-row { flex-direction: column; }
            .author-name { margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div class="top-bar" id="mainHeader">
        <div class="header-row">
            <h1 class="site-title">Backstory</h1>
            <div class="author-name">Dwaipayan Sinha</div>
        </div>
        <p class="site-description">Every major event has a hidden beginning. Discover the secret motives, accidental choices, and forgotten human drama that shaped our world.</p>
    </div>

    <div class="container">
        <div class="dashboard-layout" id="dashboardScreen">
            <nav>
                <ul class="chapter-list" id="menuContainer"></ul>
            </nav>
            <main class="preview-pane" id="previewContainer">
                <div class="loading-msg">Loading history engine...</div>
            </main>
        </div>

        <div class="reader-layout" id="readerScreen">
            <button class="back-btn" onclick="showDashboardView()">← Back to Menu</button>
            
            <div class="narration-deck">
                <button class="audio-trigger-btn" id="ttsPlaybackMasterTrigger" onclick="toggleNarrationEngine()">🎙️ Read Aloud</button>
                <div class="speed-panel-label">Speed:</div>
                <button class="audio-speed-btn" onclick="adjustPlaybackSpeed(-0.1)">-</button>
                <div class="speed-tracker-display" id="ttsSpeedLabel">1.0x</div>
                <button class="audio-speed-btn" onclick="adjustPlaybackSpeed(0.1)">+</button>
            </div>

            <div class="date" id="readerDate" style="font-size: 0.9rem; color: #777; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;"></div>
            <h2 class="reader-header" id="readerTitle" style="text-align: left; margin-top: 0;"></h2>
            
            <div class="split-reader-grid">
                <div class="map-viewer-frame" id="mapFrameContainer"></div>
                <div class="text-content-frame">
                    <p class="reader-body" id="readerBody"></p>
                </div>
            </div>

            <div class="section-divider">
                <span>THE CATALYSTS: PIECES OF THE PUZZLE</span>
            </div>

            <div id="categoriesMasterContainer"></div>
        </div>
    </div>

    <div id="popupMasterStack"></div>

    <script>
        const SHEET_ID = '1hycYKM5LljBCjWEU2qt3wpEFEUDFFuPQMPEDhKdLHg8';
        const SHEET2_GID = '714083378'; 
        const SHEET3_GID = '714083378'; 

        const CHAPTERS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
        const LEVERS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET2_GID}`;
        const CATEGORIES_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET3_GID}`;

        let globalChapters = {};
        let globalLevers = [];
        let globalCategories = {
            "1": "SECTION I : THE GEOPOLITICAL BOTTLENECKS [ THE PUSH FACTORS ]",
            "2": "SECTION II : ECONOMIC MOTIVATIONS [ THE QUEST FOR WEALTH ]"
        };

        let currentSpeechUtterance = null;
        let isAudioPlaying = false;
        let currentSpeechRate = 1.0;

        async function initSystem() {
            try {
                const [res1, res2] = await Promise.all([
                    fetch(CHAPTERS_URL).then(r => r.text()),
                    fetch(LEVERS_URL).then(r => r.text())
                ]);

                const d1 = JSON.parse(res1.substr(47).slice(0, -2)).table.rows;
                const d2 = JSON.parse(res2.substr(47).slice(0, -2)).table.rows;

                try {
                    const res3 = await fetch(CATEGORIES_URL).then(r => r.text());
                    const d3 = JSON.parse(res3.substr(47).slice(0, -2)).table.rows;
                    d3.forEach((row) => {
                        if (row && row.c && row.c[0] && row.c[1]) {
                            const catId = row.c[0].v ? row.c[0].v.toString().trim() : '';
                            if (catId && catId.toLowerCase() !== 'category_id') {
                                globalCategories[catId] = row.c[1].v;
                            }
                        }
                    });
                } catch(e) {
                    console.log("Sheet3 layout dictionary backup active.");
                }

                let firstId = null;
                d1.forEach((row) => {
                    if(!row || !row.c || !row.c[0]) return;
                    const id = row.c[0].v;
                    if (!id || id.toString().toLowerCase().trim() === 'id') return;
                    if (!firstId) firstId = id;

                    globalChapters[id] = {
                        id: id,
                        title: row.c[1] ? row.c[1].v : '',
                        date: row.c[2] ? row.c[2].v : '',
                        img: row.c[3] ? row.c[3].v : '',
                        body: row.c[4] ? row.c[4].v : '',
                        readerImg: row.c[5] ? row.c[5].v : ''
                    };
                });

                d2.forEach((row) => {
                    if(!row || !row.c || !row.c[0]) return;
                    const cId = row.c[0].v;
                    if (!cId || cId.toString().toLowerCase().trim() === 'chapter_id') return;

                    globalLevers.push({
                        chapterId: cId,
                        linkText: (row.c[1] && row.c[1].v) ? row.c[1].v : '',
                        popTitle: (row.c[2] && row.c[2].v) ? row.c[2].v : '',
                        popImg: (row.c[3] && row.c[3].v) ? row.c[3].v : '',
                        popBody: (row.c[4] && row.c[4].v) ? row.c[4].v : '',
                        popHook: (row.c[5] && row.c[5].v) ? row.c[5].v : '',
                        categoryId: (row.c[6] && row.c[6].v) ? row.c[6].v.toString().trim() : '1' 
                    });
                });

                renderMenu(firstId);
            } catch (err) {
                document.getElementById('previewContainer').innerHTML = `<div style="color:red;padding:20px;">Initialization fault. Verify spreadsheet sharing parameters.</div>`;
                console.error(err);
            }
        }

        function renderMenu(activeId) {
            let menuHtml = '';
            Object.values(globalChapters).forEach((ch) => {
                const cls = ch.id === activeId ? 'active' : '';
                menuHtml += `<li><button class="chapter-btn ${cls}" id="nav-${ch.id}" onclick="setPreviewTarget('${ch.id}')">${ch.title}</button></li>`;
            });
            document.getElementById('menuContainer').innerHTML = menuHtml;
            if(activeId) setPreviewTarget(activeId);
        }

        function setPreviewTarget(id) {
            document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`nav-${id}`);
            if (activeBtn) activeBtn.classList.add('active');

            const data = globalChapters[id];
            if (!data) return;
            
            let imageSection = data.img ? `<img src="${data.img}" class="preview-image" alt="${data.title}">` : '';
            
            document.getElementById('previewContainer').innerHTML = `
                <div class="date">${data.date}</div>
                <h2 style="margin:5px 0 15px 0; font-size:1.8rem;">${data.title}</h2>
                ${imageSection}
                <div>
                    <button class="explore-trigger-btn" onclick="launchReaderView('${id}')">Open Interactive Chapter</button>
                </div>
            `;
        }

        function launchReaderView(id) {
            stopNarrationEngine();

            const ch = globalChapters[id];
            document.getElementById('readerTitle').innerText = ch.title;
            document.getElementById('readerDate').innerText = ch.date;
            document.getElementById('readerBody').innerText = ch.body;

            const mapFrame = document.getElementById('mapFrameContainer');
            if (ch.readerImg) {
                mapFrame.innerHTML = `<img src="${ch.readerImg}" class="map-image" alt="Historical Map Context">`;
                mapFrame.style.display = 'block';
            } else {
                mapFrame.innerHTML = '';
                mapFrame.style.display = 'none';
            }

            const matchedLevers = globalLevers.filter(l => l.chapterId === id);
            let structuredMap = {};
            matchedLevers.forEach((lev) => {
                if(!structuredMap[lev.categoryId]) structuredMap[lev.categoryId] = [];
                structuredMap[lev.categoryId].push(lev);
            });

            let masterCategoriesHtml = '';
            let modalHtml = '';
            let globalModalIndex = 0;

            Object.keys(structuredMap).forEach((catId) => {
                const categoryTitle = globalCategories[catId] || `SECTION ${catId}`;
                const categoryItems = structuredMap[catId];

                masterCategoriesHtml += `
                    <div class="category-block">
                        <h4 class="category-header">${categoryTitle}</h4>
                        <div class="ledger-rows-list">
                `;

                categoryItems.forEach((lev, idx) => {
                    const uniqueId = `modal-${id}-${globalModalIndex}`;
                    const fileCode = `FILE: ${catId}-${String(idx + 1).padStart(2, '0')}`;
                    const hookContent = lev.popHook ? `"${lev.popHook}"` : '';

                    masterCategoriesHtml += `
                        <button class="ledger-row-item" onclick="openPopupWithVoiceMute('${uniqueId}')">
                            <div class="ship-bullet">⛵</div>
                            <div class="ledger-content-wrap">
                                <div class="ledger-title-line">
                                    <span class="ledger-link-text">${lev.linkText}</span>
                                    <span class="ledger-file-stamp">[ ${fileCode} ]</span>
                                </div>
                                <p class="ledger-hook-text">${hookContent}</p>
                            </div>
                        </button>
                    `;

                    let modalImgHtml = lev.popImg ? `<img src="${lev.popImg}" class="popup-img" alt="History Illustration">` : '';
                    
                    modalHtml += `
                        <dialog id="${uniqueId}">
                            ${modalImgHtml}
                            <div class="popup-content-box">
                                <button class="close-x" onclick="document.getElementById('${uniqueId}').close()">&times;</button>
                                <div style="display:flex; justify-content:space-between; align-items:start; gap:10px;">
                                    <h3 class="popup-title" style="flex:1; margin:0 0 15px 0;">${lev.popTitle}</h3>
                                    <button onclick="readPopupSegmentAloud('${uniqueId}')" style="background:none; border:none; font-size:1.3rem; cursor:pointer;" title="Read Popup Text">🎙️</button>
                                </div>
                                <p class="popup-body-content" id="body-text-${uniqueId}">${lev.popBody}</p>
                            </div>
                        </dialog>
                    `;

                    globalModalIndex++;
                });

                masterCategoriesHtml += `</div></div>`;
            });

            document.getElementById('categoriesMasterContainer').innerHTML = masterCategoriesHtml || '<p style="color:#666;font-style:italic;">No record links registered for this timeline.</p>';
            document.getElementById('popupMasterStack').innerHTML = modalHtml;

            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'none';
            document.getElementById('readerScreen').style.display = 'block';
            window.scrollTo(0,0);
        }

        function openPopupWithVoiceMute(dialogId) {
            if(window.speechSynthesis.speaking && isAudioPlaying) {
                window.speechSynthesis.pause();
                document.getElementById('ttsPlaybackMasterTrigger').innerText = "▶️ Resume Main Text";
            }
            document.getElementById(dialogId).showModal();
        }

        function toggleNarrationEngine() {
            const triggerBtn = document.getElementById('ttsPlaybackMasterTrigger');
            const mainTextContent = document.getElementById('readerBody').innerText;

            if (isAudioPlaying) {
                if (window.speechSynthesis.paused) {
                    window.speechSynthesis.resume();
                    triggerBtn.innerText = "⏸️ Pause Narration";
                } else {
                    window.speechSynthesis.pause();
                    triggerBtn.innerText = "▶️ Resume Narration";
                }
            } else {
                window.speechSynthesis.cancel(); 
                
                currentSpeechUtterance = new SpeechSynthesisUtterance(mainTextContent);
                currentSpeechUtterance.rate = currentSpeechRate;
                
                currentSpeechUtterance.onend = () => {
                    stopNarrationEngine();
                };

                window.speechSynthesis.speak(currentSpeechUtterance);
                isAudioPlaying = true;
                triggerBtn.innerText = "⏸️ Pause Narration";
            }
        }

        function readPopupSegmentAloud(dialogId) {
            window.speechSynthesis.cancel();
            const targetText = document.getElementById(`body-text-${dialogId}`).innerText;
            const popupUtterance = new SpeechSynthesisUtterance(targetText);
            popupUtterance.rate = currentSpeechRate;
            window.speechSynthesis.speak(popupUtterance);
        }

        function adjustPlaybackSpeed(delta) {
            currentSpeechRate = Math.max(0.5, Math.min(2.0, currentSpeechRate + delta));
            document.getElementById('ttsSpeedLabel').innerText = `${currentSpeechRate.toFixed(1)}x`;
            
            if (window.speechSynthesis.speaking && isAudioPlaying) {
                window.speechSynthesis.cancel();
                const remainingText = document.getElementById('readerBody').innerText;
                currentSpeechUtterance = new SpeechSynthesisUtterance(remainingText);
                currentSpeechUtterance.rate = currentSpeechRate;
                currentSpeechUtterance.onend = () => stopNarrationEngine();
                window.speechSynthesis.speak(currentSpeechUtterance);
            }
        }

        function stopNarrationEngine() {
            window.speechSynthesis.cancel();
            isAudioPlaying = false;
            const trigger = document.getElementById('ttsPlaybackMasterTrigger');
            if(trigger) trigger.innerText = "🎙️ Read Aloud";
        }

        function showDashboardView() {
            stopNarrationEngine();
            document.getElementById('mainHeader').style.display = 'block';
            document.getElementById('dashboardScreen').style.display = 'grid';
            document.getElementById('readerScreen').style.display = 'none';
        }

        window.onload = initSystem;
    </script>
</body>
</html>
