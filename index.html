<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backstory - The Hidden Levers</title>
    <style>
        :root {
            --bg-color: #f7f6f2;
            --text-color: #2c3531;
            --accent-color: #5a786b; /* Soothing Sage Green */
            --card-bg: #ffffff;
            --card-hover: rgba(90, 120, 107, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Georgia, serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .top-bar {
            max-width: 900px;
            margin: 0 auto 30px auto;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .site-title {
            font-size: 2.2rem;
            margin: 0;
            font-weight: bold;
            color: var(--text-color);
        }

        .author-name {
            font-size: 0.85rem;
            color: #777;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-top: 12px;
        }

        .site-description {
            font-size: 1.05rem;
            color: #555;
            margin: 0;
            max-width: 700px;
            line-height: 1.5;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            margin-bottom: 20px;
            display: inline-block;
        }

        .back-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* View 1: Dashboard Layout */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        .chapter-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .chapter-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 14px 18px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            color: var(--text-color);
            transition: all 0.2s;
            font-weight: 600;
            border-left: 4px solid transparent;
        }

        .chapter-btn:hover, .chapter-btn.active {
            background-color: var(--card-hover);
            color: var(--accent-color);
            border-left-color: var(--accent-color);
        }

        .preview-pane {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            text-align: center;
        }

        .preview-image {
            width: 100%;
            max-height: 380px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 15px;
        }

        .explore-trigger-btn {
            margin-top: 25px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .explore-trigger-btn:hover {
            opacity: 0.9;
        }

        /* View 2: Reader Layout */
        .reader-layout {
            display: none; 
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.02);
        }

        .reader-header {
            font-size: 2.2rem;
            margin: 5px 0 20px 0;
            text-align: center;
        }

        .reader-body {
            font-size: 1.15rem;
            color: #3e4743;
            margin-bottom: 40px;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
        }

        .section-divider {
            text-align: center;
            border-bottom: 1px solid #e0dddb;
            line-height: 0.1em;
            margin: 40px 0;
        }

        .section-divider span {
            background: var(--card-bg);
            padding: 0 15px;
            color: var(--accent-color);
            font-weight: bold;
            letter-spacing: 1.5px;
            font-size: 0.85rem;
        }

        /* Levers Cards Grid */
        .levers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .lever-card {
            background: var(--bg-color);
            border: 1px solid #e6e4de;
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lever-card:hover {
            transform: translateY(-2px);
            background-color: var(--card-bg);
            border-color: var(--accent-color);
            box-shadow: 0 4px 12px rgba(90, 120, 107, 0.1);
        }

        /* Popups styling */
        dialog {
            border: none;
            border-radius: 12px;
            padding: 0;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            background: #ffffff;
            overflow: hidden;
        }

        dialog::backdrop {
            background: rgba(44, 53, 49, 0.5);
            backdrop-filter: blur(5px);
        }

        .popup-img {
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            display: block;
        }

        .popup-content-box {
            padding: 30px;
            position: relative;
        }

        .close-x {
            position: absolute;
            top: -210px; 
            right: 15px;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .close-x:hover {
            background: white;
        }

        .popup-title {
            color: var(--accent-color);
            margin: 0 0 15px 0;
            font-size: 1.5rem;
        }

        .loading-msg {
            text-align: center;
            font-size: 1.2rem;
            padding: 50px 0;
            color: #666;
        }

        @media (max-width: 700px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .header-row { flex-direction: column; }
            .author-name { margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div class="top-bar" id="mainHeader">
        <div class="header-row">
            <h1 class="site-title">Backstory</h1>
            <div class="author-name">Dwaipayan Sinha</div>
        </div>
        <p class="site-description">Every major event has a hidden beginning. Discover the secret motives, accidental choices, and forgotten human drama that shaped our world.</p>
    </div>

    <div class="container">
        <div class="dashboard-layout" id="dashboardScreen">
            <nav>
                <ul class="chapter-list" id="menuContainer"></ul>
            </nav>
            <main class="preview-pane" id="previewContainer">
                <div class="loading-msg">Loading history engine...</div>
            </main>
        </div>

        <div class="reader-layout" id="readerScreen">
            <button class="back-btn" onclick="showDashboardView()">← Back to Menu</button>
            <div class="date" id="readerDate"></div>
            <h2 class="reader-header" id="readerTitle"></h2>
            <p class="reader-body" id="readerBody"></p>

            <div class="section-divider">
                <span>EXPLORE THE HIDDEN LEVERS OF THIS ERA</span>
            </div>

            <div class="levers-grid" id="leversContainer"></div>
        </div>
    </div>

    <div id="popupMasterStack"></div>

    <script>
        const SHEET_ID = '1hycYKM5LljBCjWEU2qt3wpEFEUDFFuPQMPEDhKdLHg8';
        const CHAPTERS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
        const LEVERS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet2`;

        let globalChapters = {};
        let globalLevers = [];

        async function initSystem() {
            try {
                const [res1, res2] = await Promise.all([fetch(CHAPTERS_URL), fetch(LEVERS_URL)]);
                const t1 = await res1.text();
                const t2 = await res2.text();

                const d1 = JSON.parse(t1.substr(47).slice(0, -2)).table.rows;
                const d2 = JSON.parse(t2.substr(47).slice(0, -2)).table.rows;

                let firstId = null;
                d1.forEach((row) => {
                    const id = row.c[0] ? row.c[0].v : '';
                    if (!id || id.toString().toLowerCase().trim() === 'id') return;
                    if (!firstId) firstId = id;

                    globalChapters[id] = {
                        id: id,
                        title: row.c[1] ? row.c[1].v : '',
                        date: row.c[2] ? row.c[2].v : '',
                        img: row.c[3] ? row.c[3].v : '',
                        body: row.c[4] ? row.c[4].v : ''
                    };
                });

                d2.forEach((row) => {
                    const cId = row.c[0] ? row.c[0].v : '';
                    if (!cId || cId.toString().toLowerCase().trim() === 'chapter_id') return;

                    globalLevers.push({
                        chapterId: cId,
                        linkText: row.c[1] ? row.c[1].v : '',
                        popTitle: row.c[2] ? row.c[2].v : '',
                        popImg: row.c[3] ? row.c[3].v : '',
                        popBody: row.c[4] ? row.c[4].v : ''
                    });
                });

                renderMenu(firstId);
            } catch (err) {
                document.getElementById('previewContainer').innerHTML = `<div style="color:red;padding:20px;">Configuration error. Please check your database settings.</div>`;
                console.error(err);
            }
        }
