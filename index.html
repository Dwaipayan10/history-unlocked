<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Unlocked - The Hidden Levers</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-color: #2b2b2b;
            --accent-color: #b85a38;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Georgia, serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .top-bar {
            max-width: 800px;
            margin: 0 auto 40px auto;
            border-bottom: 2px solid var(--text-color);
            padding-bottom: 10px;
        }

        .site-title {
            font-size: 1.8rem;
            margin: 0;
            font-weight: bold;
            color: var(--text-color);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
        }

        .chapter-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .chapter-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-color);
            transition: all 0.2s;
            font-weight: 500;
        }

        .chapter-btn:hover {
            background-color: rgba(184, 90, 56, 0.1);
            color: var(--accent-color);
        }

        .chapter-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        .content-area {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 250px;
            position: relative;
        }

        .event-content {
            display: none;
        }

        .event-content.active {
            display: block;
        }

        .date {
            font-weight: bold;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        h2 {
            margin-top: 5px;
            font-size: 1.8rem;
        }

        .trigger-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px dashed var(--accent-color);
            cursor: pointer;
        }

        .trigger-link:hover {
            color: var(--text-color);
            border-bottom-color: var(--text-color);
        }

        dialog {
            border: none;
            border-radius: 12px;
            padding: 35px 30px 30px 30px;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: #ffffff;
            position: relative;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .close-x {
            position: absolute;
            top: 12px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
        }

        .close-x:hover {
            color: var(--text-color);
        }

        .modal-title {
            color: var(--accent-color);
            margin-top: 0;
            font-size: 1.4rem;
            padding-right: 20px;
        }

        .loading-text {
            text-align: center;
            font-size: 1.2rem;
            color: #666;
            padding-top: 40px;
        }

        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1 class="site-title">History Unlocked</h1>
    </div>

    <div class="container">
        <nav>
            <ul class="chapter-list" id="menuContainer">
                </ul>
        </nav>

        <main class="content-area" id="contentContainer">
            <div class="loading-text">Loading history chapters...</div>
        </main>
    </div>

    <div id="modalContainer"></div>

    <script>
        // Connected directly to your specific Google Sheet
        const SHEET_ID = '1hycYKM5LljBCjWEU2qt3wpEFEUDFFuPQMPEDhKdLHg8';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                // Clean Google's data format into standard web data
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;

                let menuHtml = '';
                let contentHtml = '';
                let modalHtml = '';

                rows.forEach((row, index) => {
                    // Extract data box values mapping to A, B, C, D, E, F, G columns
                    const id = row.c[0] ? row.c[0].v : `chapter-${index}`;
                    const title = row.c[1] ? row.c[1].v : '';
                    const date = row.c[2] ? row.c[2].v : '';
                    const body = row.c[3] ? row.c[3].v : '';
                    const triggerText = row.c[4] ? row.c[4].v : '';
                    const popupHook = row.c[5] ? row.c[5].v : '';
                    const popupReason = row.c[6] ? row.c[6].v : '';

                    const activeClass = index === 0 ? 'active' : '';
                    const displayStyle = index === 0 ? 'block' : 'none';

                    // Build sidebar button
                    menuHtml += `<li><button class="chapter-btn ${activeClass}" id="btn-${id}" onclick="switchChapter('${id}')">Chapter ${index + 1}: ${title}</button></li>`;

                    // Build main event text body
                    contentHtml += `
                        <article id="${id}" class="event-content" style="display: ${displayStyle};">
                            <div class="date">${date}</div>
                            <h2>${title}</h2>
                            <p>${body}</p>
                            <span class="trigger-link" onclick="document.getElementById('modal-${id}').showModal()">
                                ${triggerText}
                            </span>
                        </article>
                    `;

                    // Build hidden popups dynamically
                    modalHtml += `
                        <dialog id="modal-${id}">
                            <button class="close-x" onclick="document.getElementById('modal-${id}').close()">&times;</button>
                            <h3 class="modal-title">The Hidden Lever: ${popupHook}</h3>
                            <p>${popupReason}</p>
                        </dialog>
                    `;
                });

                document.getElementById('menuContainer').innerHTML = menuHtml;
                document.getElementById('contentContainer').innerHTML = contentHtml;
                document.getElementById('modalContainer').innerHTML = modalHtml;

            } catch (error) {
                document.getElementById('contentContainer').innerHTML = `<div class="loading-text" style="color:red;">Error loading content. Make sure your Google Sheet is published to the web.</div>`;
                console.error(error);
            }
        }

        function switchChapter(targetId) {
            var items = document.getElementsByClassName('event-content');
            for (var i = 0; i < items.length; i++) {
                items[i].style.display = 'none';
            }
            document.getElementById(targetId).style.display = 'block';
            
            var btns = document.getElementsByClassName('chapter-btn');
            for (var i = 0; i < btns.length; i++) {
                btns[i].classList.remove('active');
            }
            document.getElementById('btn-' + targetId).classList.add('active');
        }

        // Start loading the spreadsheet data immediately when browser opens
        window.onload = loadData;
    </script>

</body>
</html>
