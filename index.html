<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backstory - The Hidden Levers</title>
    <style>
        :root {
            --bg-color: #f7f6f2;
            --text-color: #2c3531;
            --accent-color: #5a786b; /* Soothing Sage Green */
            --card-bg: #ffffff;
            --card-hover: rgba(90, 120, 107, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Georgia, serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .top-bar {
            max-width: 900px;
            margin: 0 auto 30px auto;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .site-title {
            font-size: 2.2rem;
            margin: 0;
            font-weight: bold;
            color: var(--text-color);
        }

        .author-name {
            font-size: 0.85rem;
            color: #777;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-top: 12px;
        }

        .site-description {
            font-size: 1.05rem;
            color: #555;
            margin: 0;
            max-width: 700px;
            line-height: 1.5;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            margin-bottom: 20px;
            display: inline-block;
        }

        .back-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* View 1: Dashboard Layout */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        .chapter-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .chapter-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 14px 18px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            color: var(--text-color);
            transition: all 0.2s;
            font-weight: 600;
            border-left: 4px solid transparent;
        }

        .chapter-btn:hover, .chapter-btn.active {
            background-color: var(--card-hover);
            color: var(--accent-color);
            border-left-color: var(--accent-color);
        }

        .preview-pane {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            text-align: center;
        }

        .preview-image {
            width: 100%;
            max-height: 380px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 15px;
        }

        .explore-trigger-btn {
            margin-top: 25px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .explore-trigger-btn:hover {
            opacity: 0.9;
        }

        /* View 2: Immersive Reader Workspace */
        .reader-layout {
            display: none; 
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.02);
        }

        .reader-header {
            font-size: 2.2rem;
            margin: 5px 0 20px 0;
            text-align: center;
        }

        .split-reader-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
            height: 450px;
        }

        .map-viewer-frame {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            background: #fbfbfa;
        }

        .map-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .text-content-frame {
            height: 100%;
            overflow-y: auto;
            padding-right: 15px;
        }

        .text-content-frame::-webkit-scrollbar {
            width: 6px;
        }
        .text-content-frame::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.02);
            border-radius: 10px;
        }
        .text-content-frame::-webkit-scrollbar-thumb {
            background: rgba(90, 120, 107, 0.3);
            border-radius: 10px;
        }

        .reader-body {
            font-size: 1.15rem;
            color: #3e4743;
            margin: 0;
            white-space: pre-wrap;
        }

        .section-divider {
            text-align: center;
            border-bottom: 1px solid #e0dddb;
            line-height: 0.1em;
            margin: 40px 0;
        }

        .section-divider span {
            background: var(--card-bg);
            padding: 0 15px;
            color: var(--accent-color);
            font-weight: bold;
            letter-spacing: 1.5px;
            font-size: 0.85rem;
        }

        /* Format 1: Investigation Board Grid Styles */
        .levers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            counter-reset: badge-counter;
        }

        .lever-card {
            background: #faf9f6; /* Subtle parchment tone */
            border: 1px solid #e2dfd9;
            padding: 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* Stamp Badge Look */
        .lever-badge {
            font-family: "Courier New", Courier, monospace;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--accent-color);
            background: rgba(90, 120, 107, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            align-self: flex-start;
            border: 1px dashed var(--accent-color);
        }

        .lever-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-color);
        }

        /* Animated Left-to-Right Reveal Hook Styles */
        .lever-hook {
            font-size: 0.95rem;
            font-style: italic;
            margin: 0;
            line-height: 1.4;
            
            /* Gradient background setup for the text */
            background: linear-gradient(to right, #2c3531 0%, #2c3531 50%, var(--accent-color) 100%);
            background-size: 200% 100%;
            background-position: 100% 0;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #666; /* Fallback */
            transition: background-position 0.4s ease;
        }

        /* Hover Board Lift & Micro-Hook Trigger State */
        .lever-card:hover {
            transform: translateY(-4px);
            background-color: #ffffff;
            border-color: #b0aba0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .lever-card:hover .lever-hook {
            background-position: 0 0; /* Smoothly sweeps gradient left-to-right */
        }

        /* Popups styling */
        dialog {
            border: none;
            border-radius: 12px;
            padding: 0;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            background: #ffffff;
            overflow: hidden;
        }

        dialog::backdrop {
            background: rgba(44, 53, 49, 0.5);
            backdrop-filter: blur(5px);
        }

        .popup-img {
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            display: block;
        }

        .popup-content-box {
            padding: 30px;
            position: relative;
        }

        .close-x {
            position: absolute;
            top: -210px; 
            right: 15px;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .loading-msg {
            text-align: center;
            font-size: 1.2rem;
            padding: 50px 0;
            color: #666;
        }

        @media (max-width: 750px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .split-reader-grid { grid-template-columns: 1fr; height: auto; }
            .map-viewer-frame { height: 300px; }
            .text-content-frame { height: auto; padding-right: 0; }
            .header-row { flex-direction: column; }
            .author-name { margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div class="top-bar" id="mainHeader">
        <div class="header-row">
            <h1 class="site-title">Backstory</h1>
            <div class="author-name">Dwaipayan Sinha</div>
        </div>
        <p class="site-description">Every major event has a hidden beginning. Discover the secret motives, accidental choices, and forgotten human drama that shaped our world.</p>
    </div>

    <div class="container">
        <div class="dashboard-layout" id="dashboardScreen">
            <nav>
                <ul class="chapter-list" id="menuContainer"></ul>
            </nav>
            <main class="preview-pane" id="previewContainer">
                <div class="loading-msg">Loading history engine...</div>
            </main>
        </div>

        <div class="reader-layout" id="readerScreen">
            <button class="back-btn" onclick="showDashboardView()">← Back to Menu</button>
            <div class="date" id="readerDate"></div>
            <h2 class="reader-header" id="readerTitle"></h2>
            
            <div class="split-reader-grid">
                <div class="map-viewer-frame" id="mapFrameContainer"></div>
                
                <div class="text-content-frame">
                    <p class="reader-body" id="readerBody"></p>
                </div>
            </div>

            <div class="section-divider">
                <span>PIECES OF THE PUZZLE: THE CATALYSTS</span>
            </div>

            <div class="levers-grid" id="leversContainer"></div>
        </div>
    </div>

    <div id="popupMasterStack"></div>

    <script>
        const SHEET_ID = '1hycYKM5LljBCjWEU2qt3wpEFEUDFFuPQMPEDhKdLHg8';
        const SHEET2_GID = '714083378'; 

        const CHAPTERS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
        const LEVERS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET2_GID}`;

        let globalChapters = {};
        let globalLevers = [];

        async function initSystem() {
            try {
                const [res1, res2] = await Promise.all([fetch(CHAPTERS_URL), fetch(LEVERS_URL)]);
                const t1 = await res1.text();
                const t2 = await res2.text();

                const d1 = JSON.parse(t1.substr(47).slice(0, -2)).table.rows;
                const d2 = JSON.parse(t2.substr(47).slice(0, -2)).table.rows;

                let firstId = null;
                d1.forEach((row) => {
                    const id = row.c[0] ? row.c[0].v : '';
                    if (!id || id.toString().toLowerCase().trim() === 'id') return;
                    if (!firstId) firstId = id;

                    globalChapters[id] = {
                        id: id,
                        title: row.c[1] ? row.c[1].v : '',
                        date: row.c[2] ? row.c[2].v : '',
                        img: row.c[3] ? row.c[3].v : '',
                        body: row.c[4] ? row.c[4].v : '',
                        readerImg: row.c[5] ? row.c[5].v : ''
                    };
                });

                d2.forEach((row) => {
                    const cId = row.c[0] ? row.c[0].v : '';
                    if (!cId || cId.toString().toLowerCase().trim() === 'chapter_id') return;

                    globalLevers.push({
                        chapterId: cId,
                        linkText: row.c[1] ? row.c[1].v : '',
                        popTitle: row.c[2] ? row.c[2].v : '',
                        popImg: row.c[3] ? row.c[3].v : '',
                        popBody: row.c[4] ? row.c[4].v : '',
                        popHook: row.c[5] ? row.c[5].v : '' // Maps dynamically to Column F hook text data
                    });
                });

                renderMenu(firstId);
            } catch (err) {
                document.getElementById('previewContainer').innerHTML = `<div style="color:red;padding:20px;">Configuration engine error. Please check sharing parameters.</div>`;
                console.error(err);
            }
        }

        function renderMenu(activeId) {
            let menuHtml = '';
            Object.values(globalChapters).forEach((ch) => {
                const cls = ch.id === activeId ? 'active' : '';
                menuHtml += `<li><button class="chapter-btn ${cls}" id="nav-${ch.id}" onclick="setPreviewTarget('${ch.id}')">${ch.title}</button></li>`;
            });
            document.getElementById('menuContainer').innerHTML = menuHtml;
            if(activeId) setPreviewTarget(activeId);
        }

        function setPreviewTarget(id) {
            document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`nav-${id}`);
            if (activeBtn) activeBtn.classList.add('active');

            const data = globalChapters[id];
            if (!data) return;
            
            let imageSection = data.img ? `<img src="${data.img}" class="preview-image" alt="${data.title}">` : '';
            
            document.getElementById('previewContainer').innerHTML = `
                <div class="date">${data.date}</div>
                <h2 style="margin:5px 0 15px 0; font-size:1.8rem;">${data.title}</h2>
                ${imageSection}
                <div>
                    <button class="explore-trigger-btn" onclick="launchReaderView('${id}')">Open Interactive Chapter</button>
                </div>
            `;
        }

        function launchReaderView(id) {
            const ch = globalChapters[id];
            document.getElementById('readerTitle').innerText = ch.title;
            document.getElementById('readerDate').innerText = ch.date;
            document.getElementById('readerBody').innerText = ch.body;

            const mapFrame = document.getElementById('mapFrameContainer');
            if (ch.readerImg) {
                mapFrame.innerHTML = `<img src="${ch.readerImg}" class="map-image" alt="Historical Map Content">`;
                mapFrame.style.display = 'block';
            } else {
                mapFrame.innerHTML = '';
                mapFrame.style.display = 'none';
            }

            const matchedLevers = globalLevers.filter(l => l.chapterId === id);
            
            let gridHtml = '';
            let modalHtml = '';

            matchedLevers.forEach((lev, idx) => {
                const uniqueId = `modal-${id}-${idx}`;
                
                // Formats incremental numerical digits into double characters safely (e.g., 01, 02)
                const sequenceNum = String(idx + 1).padStart(2, '0');
                const hookText = lev.popHook ? `"${lev.popHook}"` : '';

                // Investigation board document snippet card structure mapping
                gridHtml += `
                    <div class="lever-card" onclick="document.getElementById('${uniqueId}').showModal()">
                        <div class="lever-badge">[ ${sequenceNum} ]
